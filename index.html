<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Horarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cuadrar Horarios 📅</h1>
        
        <div class="card">
            <h2>Mi Horario</h2>
            <div class="form-group">
                <input type="text" id="nombre" placeholder="Tu nombre (ej. Daniela)">
            </div>
            <p class="instruccion">Marca los bloques donde <strong>TIENES CLASE</strong>:</p>
            
            <div class="table-responsive">
                <table id="tabla-horario">
                    <!-- La cuadrícula se generará con JavaScript -->
                </table>
            </div>
            <button onclick="guardarMiHorario()" class="btn-primary" style="margin-top: 15px; width: 100%;">Guardar mi horario</button>
        </div>

        <div class="card">
            <h2>Usuarios Registrados</h2>
            <div id="lista-usuarios"></div>
            <button onclick="limpiarDatos()" class="btn-danger">Borrar Todos los Datos</button>
        </div>

        <div class="card">
            <h2>Comparar Horarios Libres</h2>
            <p>Selecciona a las personas que quieres comparar:</p>
            <div id="selector-comparacion" class="checkbox-group"></div>
            <button onclick="compararHorarios()">Buscar Huecos Libres</button>
            
            <div id="resultados" class="resultados">
                <!-- Aquí aparecerán los horarios libres -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
